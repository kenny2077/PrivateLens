<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">PrivateLens mark</title>
  <desc id="desc">A luminous camera lens built from protected data rings and a six-blade aperture.</desc>
  <defs>
    <linearGradient id="frame" x1="84" y1="64" x2="432" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.48" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <radialGradient id="glass" cx="0" cy="0" r="1" gradientTransform="translate(212 188) rotate(48) scale(235)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#312E81"/>
      <stop offset="0.52" stop-color="#111B3A"/>
      <stop offset="1" stop-color="#070B18"/>
    </radialGradient>
    <linearGradient id="blade" x1="170" y1="146" x2="343" y2="365" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C4B5FD"/>
      <stop offset="0.52" stop-color="#818CF8"/>
