<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">PrivateLens</title>
  <desc id="desc">PrivateLens: search what you remember, keep what you own. Local-first, read-only, explainable photo search.</desc>
  <defs>
    <linearGradient id="background" x1="92" y1="0" x2="1458" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070B18"/>
      <stop offset="0.5" stop-color="#11143A"/>
      <stop offset="1" stop-color="#071A2A"/>
    </linearGradient>
    <radialGradient id="aura" cx="0" cy="0" r="1" gradientTransform="translate(1245 238) rotate(180) scale(460 360)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED" stop-opacity="0.34"/>
      <stop offset="0.52" stop-color="#0EA5E9" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#070B18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="980" y1="84" x2="1434" y2="431" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <radialGradient id="glass" cx="0" cy="0" r="1" gradientTransform="translate(1186 190) rotate(53) scale(236)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#312E81"/>
      <stop offset="0.56" stop-color="#111B3A"/>
      <stop offset="1" stop-color="#070B18"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#A5B4FC" stroke-opacity="0.07"/>
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="28" fill="url(#background)"/>
  <rect width="1600" height="520" rx="28" fill="url(#grid)"/>
  <rect width="1600" height="520" rx="28" fill="url(#aura)"/>
