<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="880" viewBox="0 0 1320 880" role="img" aria-labelledby="title desc">
  <title id="title">PrivateLens 30-second terminal demo</title>
  <desc id="desc">A terminal-style demo showing four generated photos scanned and indexed, followed by a smart fast receipt search with OCR and detection evidence.</desc>
  <defs>
    <linearGradient id="terminalFrame" x1="0" y1="0" x2="1320" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="terminalBackground" x1="80" y1="0" x2="1240" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070B18"/>
      <stop offset="0.58" stop-color="#101331"/>
      <stop offset="1" stop-color="#071A2A"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="1316" height="876" rx="18" fill="url(#terminalBackground)" stroke="url(#terminalFrame)" stroke-width="4"/>
  <rect x="2" y="2" width="1316" height="48" rx="16" fill="#111936"/>
  <circle cx="28" cy="24" r="7" fill="#ef4444"/>
  <circle cx="52" cy="24" r="7" fill="#f59e0b"/>
  <circle cx="76" cy="24" r="7" fill="#22c55e"/>
  <circle cx="109" cy="24" r="10" fill="none" stroke="#67E8F9" stroke-width="2"/>
  <circle cx="109" cy="24" r="3" fill="#67E8F9"/>
  <path d="m116 31 5 5" stroke="#67E8F9" stroke-width="2" stroke-linecap="round"/>
  <text x="134" y="31" fill="#C7D2FE" font-family="Menlo, Consolas, monospace" font-size="16">PrivateLens · local, read-only photo search</text>

  <text x="32" y="82" fill="#67E8F9" font-family="Menlo, Consolas, monospace" font-size="17">$ DEMO_DIR=/tmp/privatelens-demo-photos</text>
  <text x="32" y="110" fill="#67E8F9" font-family="Menlo, Consolas, monospace" font-size="17">$ DEMO_DATA=/tmp/privatelens-demo-index</text>

  <text x="32" y="150" fill="#67E8F9" font-family="Menlo, Consolas, monospace" font-size="17">$ privatelens --data-dir "$DEMO_DATA" demo --output-dir "$DEMO_DIR"</text>
  <text x="56" y="180" fill="#A7F3D0" font-family="Menlo, Consolas, monospace" font-size="17">Created 4 synthetic demo images.</text>

  <text x="32" y="220" fill="#67E8F9" font-family="Menlo, Consolas, monospace" font-size="17">$ privatelens --data-dir "$DEMO_DATA" scan "$DEMO_DIR"</text>
  <text x="56" y="250" fill="#A7F3D0" font-family="Menlo, Consolas, monospace" font-size="17">Scan complete! Found 4 images. New: 4. Updated: 0. Unchanged: 0.</text>

  <text x="32" y="290" fill="#67E8F9" font-family="Menlo, Consolas, monospace" font-size="17">$ privatelens --data-dir "$DEMO_DATA" index \</text>
  <text x="56" y="318" fill="#67E8F9" font-family="Menlo, Consolas, monospace" font-size="17">--skip-face --skip-vlm --batch-size 1</text>
  <text x="56" y="350" fill="#A7F3D0" font-family="Menlo, Consolas, monospace" font-size="16">Indexing complete! Indexed 4 assets. Skipped missing files: 0.</text>
  <text x="56" y="378" fill="#A7F3D0" font-family="Menlo, Consolas, monospace" font-size="16">Model migrations: 0. Errors: 0.</text>

  <text x="32" y="418" fill="#67E8F9" font-family="Menlo, Consolas, monospace" font-size="17">$ privatelens --data-dir "$DEMO_DATA" status</text>
  <text x="56" y="448" fill="#E2E8F0" font-family="Menlo, Consolas, monospace" font-size="17">Total Assets: 4    Indexed Assets: 4    Embeddings: 4</text>

  <text x="32" y="490" fill="#67E8F9" font-family="Menlo, Consolas, monospace" font-size="17">$ privatelens --data-dir "$DEMO_DATA" search receipt \</text>
  <text x="56" y="518" fill="#67E8F9" font-family="Menlo, Consolas, monospace" font-size="17">--fast --json --limit 5</text>
  <text x="56" y="550" fill="#94A3B8" font-family="Menlo, Consolas, monospace" font-size="15"># Abridged first result from the four-asset generated model gate</text>
  <text x="56" y="582" fill="#DDD6FE" font-family="Menlo, Consolas, monospace" font-size="16">{ "query": "receipt", "recipe": "find_receipt", "fast": true,</text>
  <text x="80" y="612" fill="#DDD6FE" font-family="Menlo, Consolas, monospace" font-size="16">"results": [{ "path": ".../target-receipt-lunch.jpg",</text>
  <text x="104" y="642" fill="#DDD6FE" font-family="Menlo, Consolas, monospace" font-size="16">"signals": [</text>
  <text x="128" y="672" fill="#DDD6FE" font-family="Menlo, Consolas, monospace" font-size="16">{ "source": "path", "terms": ["receipt"] },</text>
  <text x="128" y="702" fill="#DDD6FE" font-family="Menlo, Consolas, monospace" font-size="16">{ "source": "ocr", "text": "TARGET RECEIPT ... TOTAL 23.20" },</text>
  <text x="128" y="732" fill="#DDD6FE" font-family="Menlo, Consolas, monospace" font-size="16">{ "source": "detection", "labels": ["receipt"] }</text>
  <text x="104" y="762" fill="#DDD6FE" font-family="Menlo, Consolas, monospace" font-size="16">]}] }</text>

  <text x="32" y="818" fill="#94A3B8" font-family="Menlo, Consolas, monospace" font-size="16">Generated media only. Originals stay in place; the sidecar holds derived search data.</text>
  <text x="32" y="846" fill="#94A3B8" font-family="Menlo, Consolas, monospace" font-size="16">The first ML run may download weights. Cached runs perform inference locally.</text>
</svg>
