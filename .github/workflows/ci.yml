name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Synchronize locked test environment
        run: uv sync --locked --extra dev
      - name: Lint
        run: uv run --frozen --extra dev python -m ruff check .
      - name: Type check
        run: uv run --frozen --extra dev python -m mypy privatelens
      - name: Compile
        run: uv run --frozen --extra dev python -m compileall privatelens tests
      - name: Test
        run: uv run --frozen --extra dev python -m pytest tests/ -v
      - name: Build distributions
        if: matrix.python-version == '3.11'
        run: uv build --no-sources
      - name: Verify isolated wheel install and benchmark
        if: matrix.python-version == '3.11'
        shell: bash
        run: |
          consumer_env="$RUNNER_TEMP/privatelens-wheel"
          UV_PROJECT_ENVIRONMENT="$consumer_env" uv sync --locked --no-dev --no-install-project
          uv pip install --python "$consumer_env/bin/python" --no-deps dist/*.whl
          (
            cd "$RUNNER_TEMP"
            "$consumer_env/bin/privatelens" --help
            "$consumer_env/bin/privatelens" benchmark --json
          )
