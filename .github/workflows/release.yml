name: Release Python package

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Synchronize locked test environment
        run: uv sync --locked --extra dev
      - name: Lint
        run: uv run --frozen --extra dev python -m ruff check .
      - name: Type check (Python 3.11 target)
        if: matrix.python-version == '3.11'
        run: uv run --frozen --extra dev python -m mypy privatelens
      - name: Compile
        run: uv run --frozen --extra dev python -m compileall privatelens tests
      - name: Test
        run: uv run --frozen --extra dev python -m pytest tests/ -v

  build:
    name: Build and verify distributions
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Synchronize locked build environment
        run: uv sync --locked --extra dev
      - name: Require tag and package versions to match
        shell: bash
        run: |
          package_version="$(uv run --frozen --extra dev python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          runtime_version="$(uv run --frozen --extra dev python -c 'import privatelens; print(privatelens.__version__)')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$package_version" != "$runtime_version" ]]; then
            echo "Package version $package_version does not match runtime version $runtime_version" >&2
            exit 1
          fi
          if [[ "$package_version" != "$tag_version" ]]; then
            echo "Package version $package_version does not match tag $GITHUB_REF_NAME" >&2
            exit 1
          fi
      - name: Build distributions
        run: uv build --no-sources
      - name: Check distribution archives
        shell: bash
        run: |
          uv run --frozen --extra dev python -m zipfile --test dist/*.whl
          tar -tzf dist/*.tar.gz >/dev/null
      - name: Verify isolated wheel install and benchmark
        shell: bash
        run: |
          consumer_env="$RUNNER_TEMP/privatelens-wheel"
          UV_PROJECT_ENVIRONMENT="$consumer_env" uv sync --locked --no-dev --no-install-project
          uv pip install --python "$consumer_env/bin/python" --no-deps dist/*.whl
          (
            cd "$RUNNER_TEMP"
            "$consumer_env/bin/privatelens" --help
            "$consumer_env/bin/privatelens" benchmark --json
          )
      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/privatelens
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist
      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/

  release-github:
    name: Create GitHub release
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist
      - name: Create release and attach distributions
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
            exit 0
          fi

          release_flags=(--verify-tag --generate-notes --title "$GITHUB_REF_NAME")
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$tag_version" == *-* || "$tag_version" == *".dev"* || "$tag_version" =~ (a|b|rc)[0-9]+ ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" dist/* "${release_flags[@]}"

  publish-container:
    name: Publish model-free core image to GHCR
    needs: release-github
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Require tag and package versions to match
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          runtime_version="$(python -c 'import privatelens; print(privatelens.__version__)')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$package_version" != "$runtime_version" ]]; then
            echo "Package version $package_version does not match runtime version $runtime_version" >&2
            exit 1
          fi
          if [[ "$package_version" != "$tag_version" ]]; then
            echo "Package version $package_version does not match tag $GITHUB_REF_NAME" >&2
            exit 1
          fi
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Derive lowercase image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}},suffix=-core
            type=semver,pattern={{major}}.{{minor}},suffix=-core
            type=semver,pattern={{major}},suffix=-core,enable=${{ !startsWith(github.ref_name, 'v0.') }}
      - name: Publish model-free core image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          build-args: PRIVATELENS_EXTRAS=core
          platforms: linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          cache-from: type=gha,scope=container-release
          cache-to: type=gha,mode=max,scope=container-release
          provenance: mode=max
          sbom: true
